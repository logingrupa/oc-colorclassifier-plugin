# ===================================
#  Color Entry Column Definitions
# ===================================

columns:
    id:
        label: ID
        sortable: true
        invisible: true
        width: 60px

    image_url:
        label: Image
        type: image_thumbnail
        sortable: false
        width: 50px

    product_name:
        label: Product
        searchable: true
        sortable: true

    variation_name:
        label: Variation
        searchable: true
        sortable: true

    hex_color:
        label: Color
        type: color_swatch
        sortable: true
        width: 160px

    palette_colors:
        label: Palette
        type: palette_gradient
        sortable: false
        width: 140px

    color_name:
        label: Color Name
        searchable: true
        sortable: true

    taxonomy_family:
        label: Family
        type: taxonomy_value
        sortable: false
        valueFrom: taxonomy
        config:
            taxonomyField: family

    taxonomy_undertone:
        label: Undertone
        type: taxonomy_value
        sortable: false
        valueFrom: taxonomy
        config:
            taxonomyField: undertone

    taxonomy_depth:
        label: Depth
        type: taxonomy_value
        sortable: false
        valueFrom: taxonomy
        config:
            taxonomyField: depth

    taxonomy_saturation:
        label: Saturation
        type: taxonomy_value
        sortable: false
        valueFrom: taxonomy
        config:
            taxonomyField: saturation

    taxonomy_finish:
        label: Finish
        type: taxonomy_value
        sortable: false
        valueFrom: taxonomy
        config:
            taxonomyField: finish

    taxonomy_opacity:
        label: Opacity
        type: taxonomy_value
        sortable: false
        valueFrom: taxonomy
        config:
            taxonomyField: opacity

    confidence_score:
        label: Confidence
        type: confidence_badge
        sortable: true
        width: 100px

    offer_id:
        label: Offer ID
        searchable: true
        sortable: true
        invisible: true

    processed_at:
        label: Processed
        type: timetense
        sortable: true
        width: 130px
